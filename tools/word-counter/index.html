<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Counter | ToolVerse</title>

<meta name="description" content="Free online Word Counter. Count words, characters, paragraphs and reading time instantly.">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="container nav">

<a href="../../index.html" class="brand">

💜 ToolVerse

</a>

<a href="../../index.html" class="home">

← Home

</a>

</div>

</header>

<section class="hero">

<div class="container">

<h1>Word Counter</h1>

<p>

Count words, characters, sentences, paragraphs and reading time instantly.

</p>

<textarea

id="text"

placeholder="Start typing or paste your text here..."></textarea>

<div class="buttons">

<button id="copyBtn">

📋 Copy

</button>

<button id="clearBtn">

🗑 Clear

</button>

<button id="downloadBtn">

⬇ Download

</button>

</div>

<div class="stats">

<div class="card">

<h2 id="words">0</h2>

<p>Words</p>

</div>

<div class="card">

<h2 id="characters">0</h2>

<p>Characters</p>

</div>

<div class="card">

<h2 id="spaces">0</h2>

<p>No Spaces</p>

</div>

<div class="card">

<h2 id="paragraphs">0</h2>

<p>Paragraphs</p>

</div>

<div class="card">

<h2 id="sentences">0</h2>

<p>Sentences</p>

</div>

<div class="card">

<h2 id="reading">0 min</h2>

<p>Reading Time</p>

</div>

</div>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
