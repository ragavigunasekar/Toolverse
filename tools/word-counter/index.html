<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Counter | ToolVerse</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>📝 Word Counter</h1>

<p>
Paste or type your text below.
</p>

<textarea
id="text"
placeholder="Start typing..."></textarea>

<div class="stats">

<div class="box">

<h2 id="words">0</h2>

<p>Words</p>

</div>

<div class="box">

<h2 id="characters">0</h2>

<p>Characters</p>

</div>

<div class="box">

<h2 id="sentences">0</h2>

<p>Sentences</p>

</div>

<div class="box">

<h2 id="reading">0 min</h2>

<p>Reading Time</p>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
